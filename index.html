// ══════════════════════════════════════════════════════════
//  THREE.JS INIT
// ══════════════════════════════════════════════════════════
const cnv = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: cnv, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 1, 8000);

// ══════════════════════════════════════════════════════════
//  CAMERA ORBIT
// ══════════════════════════════════════════════════════════
const LOOK   = new THREE.Vector3(0, 110, 0);
let theta    = 0.4;
let phi      = 1.05;
let radius   = 540;
let autoSpin = true;

function updateCam() {
  camera.position.set(
    LOOK.x + radius * Math.sin(phi) * Math.sin(theta),
    LOOK.y + radius * Math.cos(phi),
    LOOK.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(LOOK);
}
updateCam();

// ══════════════════════════════════════════════════════════
//  LIGHTS
// ══════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x334455, 1.4));

const sun = new THREE.DirectionalLight(0xCCDDEE, 0.7);
sun.position.set(300, 500, 200);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x445566, 0.3);
fill.position.set(-200, 100, -300);
scene.add(fill);

const shimmer = new THREE.PointLight(0xFFFFFF, 0.9, 700);
scene.add(shimmer);

const zonePL = {};
ZONES.forEach(z => {
  const pl = new THREE.PointLight(z.hex, 0.8, 260);
  scene.add(pl);
  zonePL[z.id] = pl;
});

// ══════════════════════════════════════════════════════════
//  CONSTANTS & HELPERS
// ══════════════════════════════════════════════════════════
const TH = 280;

function qb(t, p0, cp, p1) {
  const m = 1 - t;
  return new THREE.Vector3(
    m*m*p0.x + 2*m*t*cp.x + t*t*p1.x,
    m*m*p0.y + 2*m*t*cp.y + t*t*p1.y,
    m*m*p0.z + 2*m*t*cp.z + t*t*p1.z
  );
}

function makeBranch(zone) {
  const a    = zone.angle;
  const dx   = Math.sin(a),  dz = Math.cos(a);
  const px   = -dz,          pz = dx;
  const by   = (1 - zone.tp) * TH;
  const span = (0.38 + zone.tp * 0.56) * 210;
  const rise = (0.88 - zone.tp * 0.55) * 58;
  const p0   = new THREE.Vector3(0,         by,          0);
  const cp   = new THREE.Vector3(dx*span*.5, by+rise*1.4, dz*span*.5);
  const p1   = new THREE.Vector3(dx*span,    by+rise*.22, dz*span);
  const peak = qb(0.5, p0, cp, p1);
  return { p0, cp, p1, peak, dx, dz, px, pz, by };
}

// ══════════════════════════════════════════════════════════
//  BUILD SCENE
// ══════════════════════════════════════════════════════════
const BD = {};
const orbMeshes = [];

// Stars handled by bg-canvas

// — Ground —
(function() {
  const mesh = new THREE.Mesh(
    new THREE.CircleGeometry(550, 48),
    new THREE.MeshBasicMaterial({ color: 0x070504 })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = -0.5;
  scene.add(mesh);

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(12, 90, 48),
    new THREE.MeshBasicMaterial({ color: 0xC8A96E, transparent: true, opacity: 0.06, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.3;
  scene.add(ring);
})();

// — Trunk —
(function() {
  const g = new THREE.CylinderGeometry(4.5, 13, TH, 14, 10);
  const pos = g.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + (Math.random() - 0.5) * 0.5);
    pos.setZ(i, pos.getZ(i) + (Math.random() - 0.5) * 0.5);
  }
  pos.needsUpdate = true;
  g.computeVertexNormals();
  const trunk = new THREE.Mesh(g, new THREE.MeshPhongMaterial({
    color: 0x1E1509, specular: 0x332211, shininess: 15, emissive: 0x050300
  }));
  trunk.position.y = TH / 2;
  scene.add(trunk);
})();

// — Roots —
(function() {
  for (let r = 0; r < 8; r++) {
    const a = (r / 8) * Math.PI * 2;
    const curve = new THREE.QuadraticBezierCurve3(
      new THREE.Vector3(Math.sin(a)*8,  2,   Math.cos(a)*8),
      new THREE.Vector3(Math.sin(a)*50, -16, Math.cos(a)*50),
      new THREE.Vector3(Math.sin(a)*95, -28, Math.cos(a)*95)
    );
    scene.add(new THREE.Mesh(
      new THREE.TubeGeometry(curve, 8, Math.max(1, 3.5 - r * 0.35), 5, false),
      new THREE.MeshBasicMaterial({ color: 0x1C1108 })
    ));
  }
})();

// — Branches + Orbs —
ZONES.forEach(zone => {
  const bd  = makeBranch(zone);
  BD[zone.id] = bd;

  const col  = new THREE.Color(zone.hex);
  const emit = col.clone().multiplyScalar(0.28);

  const curve = new THREE.QuadraticBezierCurve3(bd.p0, bd.cp, bd.p1);
  const tubeR = Math.min(3.5, 0.9 + (1 - zone.tp) * 2.0);
  scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 28, tubeR, 7, false),
    new THREE.MeshPhongMaterial({
      color: col, emissive: emit,
      specular: new THREE.Color(0.7, 0.7, 0.7),
      shininess: 80, transparent: true, opacity: 0.95
    })
  ));

  const grp = new THREE.Group();
  grp.position.copy(bd.peak);

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(8, 20, 20),
    new THREE.MeshBasicMaterial({ color: col })
  );
  core.userData.zoneId = zone.id;
  grp.add(core);
  orbMeshes.push(core);

  [20, 36, 58].forEach((r, gi) => {
    grp.add(new THREE.Mesh(
      new THREE.SphereGeometry(r, 10, 10),
      new THREE.MeshBasicMaterial({
        color: col, transparent: true,
        opacity: 0.12 / (gi + 1), side: THREE.BackSide, depthWrite: false
      })
    ));
  });

  const spec = new THREE.Mesh(
    new THREE.SphereGeometry(2.2, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.85 })
  );
  spec.position.set(-2.8, 2.8, 2.5);
  grp.add(spec);

  scene.add(grp);
  zone._grp = grp;
  zonePL[zone.id].position.copy(bd.peak);
});

// ══════════════════════════════════════════════════════════
//  FROND SYSTEM
// ══════════════════════════════════════════════════════════
const NF = 26, NS = 5;
const fronds = {};

ZONES.forEach(zone => {
  const bd  = BD[zone.id];
  const nv  = NF * NS * 2;
  const pos = new Float32Array(nv * 3);
  const col = new Float32Array(nv * 3);
  const c   = new THREE.Color(zone.hex);

  for (let i = 0; i < nv; i++) { col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b; }

  const attach = [];
  for (let f = 0; f < NF; f++) {
    attach.push(qb(0.05 + (f / (NF - 1)) * 0.88, bd.p0, bd.cp, bd.p1));
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const ls = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.82
  }));
  scene.add(ls);

  const springs = Array.from({length: NF}, () => ({ dx: 0, dz: 0, vx: 0, vz: 0 }));
  fronds[zone.id] = { geo, pos, attach, px: bd.px, pz: bd.pz, dx: bd.dx, dz: bd.dz, springs };
});

// Spring constants — chime feel
const SPRING_K    = 0.018;
const SPRING_DAMP = 0.88;
const SPRING_MAX  = 55;

function tickFronds(t) {
  ZONES.forEach(zone => {
    const { geo, pos, attach, px, pz, dx, dz, springs } = fronds[zone.id];
    let vi = 0;

    for (let f = 0; f < NF; f++) {
      const ap = attach[f];
      const sp = springs[f];
      const fl = Math.max(22, ap.y);

      sp.vx += -SPRING_K * sp.dx;
      sp.vz += -SPRING_K * sp.dz;
      sp.vx *= SPRING_DAMP;
      sp.vz *= SPRING_DAMP;
      sp.dx += sp.vx;
      sp.dz += sp.vz;
      const mag = Math.sqrt(sp.dx*sp.dx + sp.dz*sp.dz);
      if (mag > SPRING_MAX) { sp.dx *= SPRING_MAX/mag; sp.dz *= SPRING_MAX/mag; }

      const s1 = Math.sin(t * 0.78 + f * 0.52 + zone.id * 0.66) * 6;
      const s2 = Math.sin(t * 0.54 + f * 0.37 + zone.id * 0.4  + 1.2) * 2.5;

      for (let s = 0; s < NS; s++) {
        const t0 = s / NS, t1 = (s + 1) / NS;
        const f0 = t0*t0, f1 = t1*t1;

        pos[vi*3]   = ap.x + px*s1*f0 + dx*s2*f0 + sp.dx*f0;
        pos[vi*3+1] = ap.y - t0 * fl;
        pos[vi*3+2] = ap.z + pz*s1*f0 + dz*s2*f0 + sp.dz*f0;
        vi++;
        pos[vi*3]   = ap.x + px*s1*f1 + dx*s2*f1 + sp.dx*f1;
        pos[vi*3+1] = Math.max(0, ap.y - t1 * fl);
        pos[vi*3+2] = ap.z + pz*s1*f1 + dz*s2*f1 + sp.dz*f1;
        vi++;
      }
    }
    geo.attributes.position.needsUpdate = true;
  });
}

// ══════════════════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════════════════
const NP   = 200;
const pPos = new Float32Array(NP * 3);
const pCol = new Float32Array(NP * 3);
const pVel = [];
let pGeo   = null;

function resetParticle(i) {
  const z  = ZONES[Math.floor(Math.random() * ZONES.length)];
  const bd = BD[z.id];
  if (!bd) return;
  const bt = Math.random();
  const bp = qb(bt, bd.p0, bd.cp, bd.p1);
  pPos[i*3]   = bp.x + (Math.random() - 0.5) * 30;
  pPos[i*3+1] = Math.random() * bp.y;
  pPos[i*3+2] = bp.z + (Math.random() - 0.5) * 30;
  const c = new THREE.Color(z.hex);
  pVel[i] = {
    vx: (Math.random() - 0.5) * 0.3,
    vy: 0.15 + Math.random() * 0.45,
    vz: (Math.random() - 0.5) * 0.3,
    r: c.r, g: c.g, b: c.b,
    life: 0, maxL: 90 + Math.random() * 110
  };
}

(function initParticles() {
  for (let i = 0; i < NP; i++) {
    pPos[i*3] = pPos[i*3+1] = pPos[i*3+2] = 0;
    pCol[i*3] = pCol[i*3+1] = pCol[i*3+2] = 0.5;
    const z = ZONES[i % ZONES.length];
    const c = new THREE.Color(z.hex);
    pVel[i] = { vx:0, vy:.5, vz:0, r:c.r, g:c.g, b:c.b, life:0, maxL:1 };
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    size: 2.5, sizeAttenuation: true, vertexColors: true,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  })));
  pGeo = g;
})();

function tickParticles() {
  for (let i = 0; i < NP; i++) {
    const v = pVel[i]; if (!v) continue;
    pPos[i*3]   += v.vx;
    pPos[i*3+1] += v.vy;
    pPos[i*3+2] += v.vz;
    v.vx += (Math.random() - 0.5) * 0.03;
    v.life++;
    const a = Math.max(0, 1 - v.life / v.maxL);
    pCol[i*3] = v.r * a; pCol[i*3+1] = v.g * a; pCol[i*3+2] = v.b * a;
    if (v.life >= v.maxL) resetParticle(i);
  }
  if (pGeo) {
    pGeo.attributes.position.needsUpdate = true;
    pGeo.attributes.color.needsUpdate    = true;
  }
}

// ══════════════════════════════════════════════════════════
//  CHIME IMPULSE SYSTEM
// ══════════════════════════════════════════════════════════
const chimeRay   = new THREE.Raycaster();
const chimeNDC   = new THREE.Vector2();
const CHIME_RADIUS   = 80;
const CHIME_FALLOFF  = 2.2;
let   chimePrev  = null;

window.addEventListener('mousemove', e => {
  if (dragging) return;

  chimeNDC.x = (e.clientX / window.innerWidth)  *  2 - 1;
  chimeNDC.y = (e.clientY / window.innerHeight) * -2 + 1;
  chimeRay.setFromCamera(chimeNDC, camera);

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  const curtain = new THREE.Plane(forward, -forward.dot(LOOK));
  const hit = new THREE.Vector3();
  if (!chimeRay.ray.intersectPlane(curtain, hit)) return;

  let impX = 0, impZ = 0;
  if (chimePrev) {
    impX = (hit.x - chimePrev.x) * 1.8;
    impZ = (hit.z - chimePrev.z) * 1.8;
    const spd = Math.sqrt(impX*impX + impZ*impZ);
    if (spd > 0.5) {
      ZONES.forEach(zone => {
        const { attach, springs } = fronds[zone.id];
        attach.forEach((ap, f) => {
          const distX = ap.x - hit.x;
          const distZ = ap.z - hit.z;
          const distY = ap.y - hit.y;
          const dist  = Math.sqrt(distX*distX + distZ*distZ + distY*distY * 0.3);
          if (dist < CHIME_RADIUS) {
            const falloff = Math.pow(1 - dist / CHIME_RADIUS, CHIME_FALLOFF);
            const phase   = 1 + 0.25 * Math.sin(f * 1.3 + zone.id * 0.7);
            springs[f].vx += impX * falloff * phase * 0.05;
            springs[f].vz += impZ * falloff * phase * 0.05;
          }
        });
      });
    }
  }
  chimePrev = hit.clone();
});

// ══════════════════════════════════════════════════════════
//  ORBIT CONTROLS
// ══════════════════════════════════════════════════════════
let dragging = false, lastXY = { x:0, y:0 }, didMove = false;

cnv.addEventListener('mousedown', e => {
  dragging = true; lastXY = { x:e.clientX, y:e.clientY }; didMove = false; autoSpin = false;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastXY.x, dy = e.clientY - lastXY.y;
  if (Math.abs(dx) + Math.abs(dy) > 3) didMove = true;
  theta -= dx * 0.006;
  phi    = Math.max(0.05, Math.min(Math.PI * 0.95, phi + dy * 0.006));
  lastXY = { x:e.clientX, y:e.clientY };
  updateCam();
});
window.addEventListener('mouseup', () => { dragging = false; });

cnv.addEventListener('wheel', e => {
  e.preventDefault();
  radius = Math.max(80, Math.min(1600, radius * (e.deltaY > 0 ? 1.04 : 0.96)));
  updateCam();
}, { passive: false });

let t1 = { x:0, y:0 }, pinchD = 0, touchDrag = false;
cnv.addEventListener('touchstart', e => {
  e.preventDefault(); autoSpin = false;
  if (e.touches.length === 1) { touchDrag = true; t1 = { x:e.touches[0].clientX, y:e.touches[0].clientY }; }
  else if (e.touches.length === 2) { pinchD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
}, { passive:false });
cnv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touchDrag) {
    const dx = e.touches[0].clientX - t1.x, dy = e.touches[0].clientY - t1.y;
    theta -= dx * 0.007;
    phi    = Math.max(0.05, Math.min(Math.PI * 0.95, phi + dy * 0.007));
    t1 = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    updateCam();
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    radius = Math.max(80, Math.min(1600, radius * (1 + (pinchD / d - 1) * 0.55)));
    pinchD = d; updateCam();
  }
}, { passive:false });
cnv.addEventListener('touchend', () => { touchDrag = false; });

document.getElementById('zi').addEventListener('click', () => { radius = Math.max(80, radius * 0.82); updateCam(); });
document.getElementById('zo').addEventListener('click', () => { radius = Math.min(1600, radius * 1.18); updateCam(); });

// ══════════════════════════════════════════════════════════
//  RAYCASTING
// ══════════════════════════════════════════════════════════
const ray = new THREE.Raycaster();
const mp  = new THREE.Vector2();
cnv.addEventListener('click', e => {
  if (didMove) return;
  const r = cnv.getBoundingClientRect();
  mp.x = ((e.clientX - r.left) / r.width)  *  2 - 1;
  mp.y = ((e.clientY - r.top)  / r.height) * -2 + 1;
  ray.setFromCamera(mp, camera);
  const hits = ray.intersectObjects(orbMeshes);
  if (hits.length) {
    const z = ZONES.find(z => z.id === hits[0].object.userData.zoneId);
    if (z) openZone(z);
  }
});

// ══════════════════════════════════════════════════════════
//  PANEL
// ══════════════════════════════════════════════════════════
function openZone(z) {
  document.getElementById('pbar').style.background = z.hex;
  document.getElementById('pnum').textContent  = `ZONE ${String(z.id).padStart(2,'0')} / 12`;
  document.getElementById('pname').textContent = z.name;
  document.getElementById('poil').textContent  = `✦ ${z.oil}`;
  document.getElementById('pprinciple').textContent = z.principle;
  document.getElementById('pwav').textContent  = z.wavelength;
  const te = document.getElementById('ptags'); te.innerHTML = '';
  z.projects.forEach(p => {
    const el = document.createElement('div'); el.className = 'tag'; el.textContent = p;
    el.style.borderColor = z.hex + '33'; el.style.color = z.hex + 'AA'; te.appendChild(el);
  });
  document.getElementById('pnotes').textContent = z.notes;
  document.getElementById('pfruit').textContent  = z.fruit;
  document.getElementById('panel').classList.add('open');
  if (z._grp) { z._grp.scale.setScalar(1.7); setTimeout(() => z._grp.scale.setScalar(1), 380); }
}
document.getElementById('pclose').addEventListener('click', () => document.getElementById('panel').classList.remove('open'));

// ══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════════════════
window._drawBg = null;
let _bgLast = 0;
const BG_INTERVAL = 1000 / 22;

function animate(ms) {
  requestAnimationFrame(animate);
  const t = ms * 0.001;

  if (autoSpin) { theta += 0.0018; updateCam(); }
  shimmer.position.set(Math.sin(t * 0.22) * 350, 160 + Math.sin(t * 0.17) * 70, Math.cos(t * 0.22) * 350);

  ZONES.forEach(z => {
    if (z._grp && z._grp.scale.x < 1.6) {
      const s = 1 + 0.07 * Math.sin(t * 1.4 + z.id * 0.55);
      z._grp.scale.setScalar(s);
    }
    zonePL[z.id].intensity = 0.55 + 0.28 * Math.sin(t * 1.2 + z.id * 0.6);
  });

  tickFronds(t);
  tickParticles();
  renderer.render(scene, camera);

  if (window._drawBg && ms - _bgLast > BG_INTERVAL) {
    _bgLast = ms;
    window._drawBg(ms);
  }
}
animate(0);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (window.bgResize) window.bgResize();
});

// ══════════════════════════════════════════════════════════
//  FOREST BACKGROUND  (2D canvas — driven by main animate loop)
// ══════════════════════════════════════════════════════════
(function() {
  const bc  = document.getElementById('bg-canvas');
  const bx  = bc.getContext('2d');

  function bgResize() {
    bc.width  = window.innerWidth;
    bc.height = window.innerHeight;
  }
  window.bgResize = bgResize;
  bgResize();

  const W = () => bc.width, H = () => bc.height;

  const SKY_PALETTE = [
    [  2,  4,  8],
    [  4,  8, 18],
    [  6, 12, 10],
    [  8,  4, 16],
    [  4, 10, 16],
  ];

  const STARS = Array.from({length: 160}, () => ({
    x: Math.random(), y: Math.random() * 0.68,
    r: 0.3 + Math.random() * 1.1,
    a: Math.random(),
    sp: 0.3 + Math.random() * 1.4,
    ph: Math.random() * Math.PI * 2
  }));

  function genTrees(n, depthMin, depthMax, hMin, hMax) {
    return Array.from({length: n}, () => ({
      x:   Math.random(),
      dep: depthMin + Math.random() * (depthMax - depthMin),
      h:   hMin    + Math.random() * (hMax - hMin),
      style: ['pine','pine','pine','oak','willow'][Math.floor(Math.random()*5)],
      ph:  Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 0.00008
    }));
  }

  const FAR_TREES  = genTrees(38, 0.72, 1.0, 0.22, 0.48);
  const MID_TREES  = genTrees(24, 0.38, 0.72, 0.28, 0.55);
  const NEAR_TREES = genTrees(14, 0.0,  0.38, 0.32, 0.62);

  function drawPine(x, y, h, alpha, col, swayX) {
    const layers = 5;
    bx.save(); bx.translate(x + swayX, y);
    for (let i = 0; i < layers; i++) {
      const ly = -h * (0.15 + i * 0.175);
      const lw = h * (0.11 + (layers - i) * 0.065);
      bx.beginPath(); bx.moveTo(0, ly); bx.lineTo(-lw, ly + h*0.18); bx.lineTo(lw, ly + h*0.18); bx.closePath();
      bx.fillStyle = `rgba(${col},${alpha * (0.55 + i * 0.09)})`; bx.fill();
    }
    bx.fillStyle = `rgba(${col},${alpha * 0.4})`;
    bx.fillRect(-h*0.018, 0, h*0.036, h*0.15);
    bx.restore();
  }

  function drawOak(x, y, h, alpha, col, swayX) {
    bx.save(); bx.translate(x + swayX * 0.7, y);
    bx.fillStyle = `rgba(${col},${alpha * 0.45})`;
    bx.fillRect(-h*0.025, -h*0.28, h*0.05, h*0.3);
    const blobs = [[0,-h*.58,h*.28],[-h*.18,-h*.48,h*.2],[h*.18,-h*.48,h*.2],[-h*.08,-h*.72,h*.16],[h*.08,-h*.72,h*.16]];
    blobs.forEach(([bx2,by2,br]) => {
      const g = bx.createRadialGradient(bx2,by2,0,bx2,by2,br);
      g.addColorStop(0,`rgba(${col},${alpha*0.7})`); g.addColorStop(1,`rgba(${col},0)`);
      bx.beginPath(); bx.arc(bx2,by2,br,0,Math.PI*2); bx.fillStyle=g; bx.fill();
    });
    bx.restore();
  }

  function drawWillow(x, y, h, alpha, col, swayX, t) {
    bx.save(); bx.translate(x + swayX * 0.5, y);
    bx.fillStyle = `rgba(${col},${alpha*0.4})`;
    bx.fillRect(-h*0.02,-h*0.55,h*0.04,h*0.57);
    const nf = 9;
    for (let f = 0; f < nf; f++) {
      const fx = (f/(nf-1)-0.5)*h*0.55;
      const sw = Math.sin(t*0.6+f*0.8+swayX)*h*0.04;
      bx.beginPath(); bx.moveTo(fx,-h*0.52);
      bx.quadraticCurveTo(fx+sw+h*0.06,-h*0.22,fx+sw*1.8,h*0.04);
      bx.strokeStyle=`rgba(${col},${alpha*(0.35+0.2*Math.sin(f))})`;
      bx.lineWidth=Math.max(0.5,h*0.008); bx.stroke();
    }
    bx.restore();
  }

  const FLIES = Array.from({length: 10}, () => ({
    x: Math.random(), y: 0.42 + Math.random() * 0.45,
    r: 1.2 + Math.random() * 1.8,
    ph: Math.random() * Math.PI * 2,
    sp: 0.4 + Math.random() * 0.8,
    col: ZONES[Math.floor(Math.random() * ZONES.length)].hex,
    vx: (Math.random() - 0.5) * 0.00010, vy: (Math.random() - 0.5) * 0.00007
  }));

  function lerpRGB(a, b, t) {
    return [Math.round(a[0]+(b[0]-a[0])*t), Math.round(a[1]+(b[1]-a[1])*t), Math.round(a[2]+(b[2]-a[2])*t)];
  }

  function drawBg(ms) {
    const bgT = ms * 0.001;
    const w = W(), h = H();
    bx.clearRect(0, 0, w, h);

    const phase = bgT * 0.018;
    const idx0  = Math.floor(phase) % SKY_PALETTE.length;
    const idx1  = (idx0 + 1) % SKY_PALETTE.length;
    const blend = phase - Math.floor(phase);
    const topC  = lerpRGB(SKY_PALETTE[idx0], SKY_PALETTE[idx1], blend);
    const botC  = lerpRGB([topC[0]+2,topC[1]+5,topC[2]+3],[topC[0]+8,topC[1]+14,topC[2]+8],0.5);

    const sky = bx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, `rgb(${topC[0]},${topC[1]},${topC[2]})`);
    sky.addColorStop(0.6, `rgb(${botC[0]},${botC[1]},${botC[2]})`);
    sky.addColorStop(1, `rgb(${Math.max(0,topC[0]-2)},${Math.max(0,topC[1]-2)},${Math.max(0,topC[2]-2)})`);
    bx.fillStyle = sky; bx.fillRect(0,0,w,h);

    STARS.forEach(s => {
      const pulse = 0.3 + 0.7*(0.5+0.5*Math.sin(bgT*s.sp+s.ph));
      bx.beginPath(); bx.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);
      bx.fillStyle=`rgba(255,255,255,${s.a*pulse*0.6})`; bx.fill();
    });

    const auroraY = h*(0.12+0.06*Math.sin(bgT*0.09));
    const aurH = h*0.22;
    const aR=20+30*Math.abs(Math.sin(bgT*0.07)), aG=60+40*Math.abs(Math.sin(bgT*0.05+1)), aB=40+30*Math.abs(Math.sin(bgT*0.06+2));
    const aA=0.03+0.04*Math.abs(Math.sin(bgT*0.04));
    const aur = bx.createLinearGradient(0,auroraY,0,auroraY+aurH);
    aur.addColorStop(0,`rgba(${aR},${aG},${aB},0)`); aur.addColorStop(0.4,`rgba(${aR},${aG},${aB},${aA})`); aur.addColorStop(1,`rgba(${aR},${aG},${aB},0)`);
    bx.fillStyle=aur; bx.fillRect(0,auroraY,w,aurH);

    function renderLayer(trees) {
      trees.forEach(tr => {
        const dep = tr.dep;
        const dark = Math.round(4 + dep * 8);
        const col = `${dark},${dark+2},${dark}`;
        const alpha = 0.55 + dep * 0.38;
        const tx = tr.x * w;
        const ty = h * (0.55 + dep * 0.22);
        const th2 = h * tr.h * (0.3 + dep * 0.55);
        const sway = Math.sin(bgT * 0.35 + tr.ph) * w * 0.003 * (1 - dep);
        bx.globalAlpha = alpha;
        if (tr.style === 'pine')       drawPine(tx, ty, th2, 1, col, sway);
        else if (tr.style === 'oak')   drawOak(tx, ty, th2, 1, col, sway);
        else                           drawWillow(tx, ty, th2, 1, col, sway, bgT);
        bx.globalAlpha = 1;
      });
    }

    renderLayer(FAR_TREES);
    renderLayer(MID_TREES);

    const fog = bx.createLinearGradient(0,h*0.72,0,h);
    fog.addColorStop(0,`rgba(${topC[0]+3},${topC[1]+6},${topC[2]+4},0)`);
    fog.addColorStop(1,`rgba(${topC[0]+6},${topC[1]+12},${topC[2]+8},0.55)`);
    bx.fillStyle=fog; bx.fillRect(0,h*0.72,w,h*0.28);

    renderLayer(NEAR_TREES);

    const fog2 = bx.createLinearGradient(0,h*0.82,0,h);
    fog2.addColorStop(0,`rgba(${topC[0]},${topC[1]+4},${topC[2]},0)`);
    fog2.addColorStop(1,`rgba(${topC[0]+3},${topC[1]+8},${topC[2]+3},0.75)`);
    bx.fillStyle=fog2; bx.fillRect(0,h*0.82,w,h*0.18);

    bx.save();
    FLIES.forEach(f => {
      f.x += f.vx; f.y += f.vy;
      if (f.x < 0) f.x = 1; if (f.x > 1) f.x = 0;
      if (f.y < 0.38) f.y = 0.88; if (f.y > 0.92) f.y = 0.42;
      const pulse = 0.4 + 0.6*Math.sin(bgT*f.sp+f.ph);
      bx.shadowBlur=10; bx.shadowColor=f.col;
      bx.globalAlpha=pulse*0.9; bx.fillStyle=f.col;
      bx.beginPath(); bx.arc(f.x*w,f.y*h,f.r,0,Math.PI*2); bx.fill();
    });
    bx.shadowBlur=0; bx.restore();
  }

  window._drawBg = drawBg;
})();
</script>
</body>
</html>
