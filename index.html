<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Will-Oats-Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #030305; }
  canvas { display: block; }
  @keyframes willFade { from { opacity: 0; } to { opacity: 1; } }
  .panel { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .slider { -webkit-appearance: none; appearance: none; height: 3px; border-radius: 3px;
    background: linear-gradient(90deg, #d8a23a, #ffe9a8); outline: none; cursor: pointer; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #ffeec0; border: 1px solid #b9882e; cursor: pointer;
    box-shadow: 0 0 10px rgba(255,210,120,.8); }
  .slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #ffeec0;
    border: 1px solid #b9882e; cursor: pointer; }
  .btn { transition: background .2s, border-color .2s, color .2s; cursor: pointer; font-family: inherit;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 0; border-radius: 9px; border: 1px solid; }
  #zone-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 320px;
    background: rgba(10,8,15,.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-left: 1px solid rgba(255,210,140,.14);
    transform: translateX(320px); transition: transform .35s cubic-bezier(.22,1,.36,1);
    z-index: 100; display: flex; flex-direction: column; overflow-y: auto;
  }
  #zone-panel.open { transform: translateX(0); }
  #zone-panel-header { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,210,140,.1); }
  #zone-panel-close {
    position: absolute; top: 20px; right: 20px;
    background: none; border: none; color: rgba(255,210,140,.5);
    font-size: 22px; cursor: pointer; line-height: 1; transition: color .15s;
  }
  #zone-panel-close:hover { color: #ffeec0; }
  #zone-panel-body { padding: 20px 24px; flex: 1; }
  .zone-field { margin-bottom: 18px; }
  .zone-label { font-family: ui-monospace,Menlo,monospace; font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,210,140,.45); margin-bottom: 5px; }
  .zone-value { font-size: 14px; color: #f5ecd8; line-height: 1.5; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<script>
const ZONES = [
  {id:1,  name:"GROUNDING",   oil:"Valor",             hex:"#FF2222", wavelength:"700–635nm", principle:"Stability · Safety · Foundation",    tp:.88},
  {id:2,  name:"COURAGE",     oil:"Valor II",          hex:"#FF5500", wavelength:"635–610nm", principle:"Boldness · Drive · Action",           tp:.80},
  {id:3,  name:"PASSION",     oil:"En-R-Gee",          hex:"#FF8800", wavelength:"610–590nm", principle:"Fire · Vitality · Desire",            tp:.72},
  {id:4,  name:"CREATIVITY",  oil:"Joy",               hex:"#FFCC00", wavelength:"590–570nm", principle:"Play · Invention · Expression",       tp:.64},
  {id:5,  name:"CLARITY",     oil:"Lemon",             hex:"#FFEE00", wavelength:"570–550nm", principle:"Focus · Discernment · Truth",         tp:.56},
  {id:6,  name:"GROWTH",      oil:"Peppermint",        hex:"#66FF00", wavelength:"550–500nm", principle:"Expansion · Learning · Becoming",     tp:.48},
  {id:7,  name:"FLOW",        oil:"Peace & Calming",   hex:"#00FF88", wavelength:"500–490nm", principle:"Ease · Rhythm · Surrender",           tp:.40},
  {id:8,  name:"EXPRESSION",  oil:"Highest Potential", hex:"#00DDFF", wavelength:"490–450nm", principle:"Voice · Art · Communication",         tp:.32},
  {id:9,  name:"VISION",      oil:"Dream Catcher",     hex:"#0099FF", wavelength:"450–430nm", principle:"Sight · Dreams · Possibility",        tp:.25},
  {id:10, name:"INTUITION",   oil:"Lavender",          hex:"#7744FF", wavelength:"430–400nm", principle:"Knowing · Sensing · Inner Guidance",  tp:.18},
  {id:11, name:"SPIRIT",      oil:"Sacred Mountain",   hex:"#BB00FF", wavelength:"400–380nm", principle:"Connection · Sacred · Transcendence", tp:.11},
  {id:12, name:"INTEGRATION", oil:"Frankincense",      hex:"#C8A96E", wavelength:"All",       principle:"Wholeness · Unity · The One",         tp:.05},
];
ZONES.forEach((z, i) => { z.angle = (i / ZONES.length) * Math.PI * 2; });
</script>

<div id="zone-panel">
  <div id="zone-panel-header">
    <button id="zone-panel-close">×</button>
    <div class="panel" id="zp-id" style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,210,140,.4);margin-bottom:6px;"></div>
    <div id="zp-name" style="font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:400;color:#f5ecd8;"></div>
    <div id="zp-wave" class="panel" style="font-size:10px;letter-spacing:1px;color:rgba(255,210,140,.4);margin-top:4px;"></div>
  </div>
  <div id="zone-panel-body">
    <div class="zone-field">
      <div class="zone-label">Principle</div>
      <div class="zone-value" id="zp-principle"></div>
    </div>
    <div class="zone-field">
      <div class="zone-label">Young Living Oil</div>
      <div class="zone-value" id="zp-oil"></div>
    </div>
  </div>
</div>

<div style="position:fixed;inset:0;overflow:hidden;background:radial-gradient(120% 120% at 50% 42%,#0c0b14,#030305 70%);">
  <canvas id="main-canvas" style="width:100%;height:100%;"></canvas>
  <div style="position:absolute;top:26px;left:28px;animation:willFade 1.4s ease both;pointer-events:none;">
    <div class="panel" style="font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,214,140,.55);">WILL-OATS-TREE</div>
    <div style="font-family:Georgia,'Times New Roman',serif;font-size:34px;font-weight:400;letter-spacing:.5px;color:#f5ecd8;margin-top:6px;text-shadow:0 2px 36px rgba(255,190,90,.4);">Weeping&nbsp;Willow</div>
    <div class="panel" style="font-size:11px;letter-spacing:1px;color:rgba(235,220,190,.4);margin-top:8px;">drag to orbit · scroll to zoom · click a node</div>
  </div>
  <div class="panel" style="position:absolute;bottom:26px;left:28px;animation:willFade 1.8s ease both;
      display:flex;flex-direction:column;gap:13px;padding:18px 20px 20px;border-radius:16px;
      background:rgba(14,12,18,.5);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:1px solid rgba(255,210,140,.16);box-shadow:0 18px 50px rgba(0,0,0,.55);">
    <div style="display:flex;flex-direction:column;gap:9px;width:204px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,214,140,.6);">Breeze</span>
        <span id="wind-label" style="font-size:11px;color:#f5ecd8;font-variant-numeric:tabular-nums;">40%</span>
      </div>
      <input id="wind-slider" class="slider" type="range" min="0" max="1.5" step="0.01" value="0.6">
    </div>
    <div style="display:flex;gap:10px;">
      <button id="btn-spin"     class="btn" style="flex:1;">Spin</button>
      <button id="btn-sparkle"  class="btn" style="flex:1;">Sparkle</button>
    </div>
    <div style="display:flex;gap:10px;">
      <button id="btn-spectral" class="btn" style="flex:1;">Rainbow</button>
    </div>
  </div>
  <div id="hov-tip" style="position:fixed;left:0;top:0;pointer-events:none;z-index:200;
      padding:7px 13px;border-radius:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px;
      letter-spacing:1.5px;text-transform:uppercase;color:#fdf3d6;
      background:rgba(16,13,10,.85);border:1px solid #ffd877;box-shadow:0 6px 22px rgba(0,0,0,.5);
      transform:translate(-50%,-150%);opacity:0;transition:opacity .16s ease;white-space:nowrap;"></div>
</div>

<script>
(function() {
  var THREE = window.THREE;

  function radialTex(inner, outer) {
    var c = document.createElement('canvas'); c.width = c.height = 128;
    var x = c.getContext('2d');
    var g = x.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0, inner); g.addColorStop(1, outer);
    x.fillStyle = g; x.fillRect(0,0,128,128);
    var t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
  }

  function makeBarkTex() {
    var c = document.createElement('canvas'); c.width = 128; c.height = 512;
    var x = c.getContext('2d');
    x.fillStyle = '#090910'; x.fillRect(0,0,128,512);
    x.lineCap = 'round';
    for (var i = 0; i < 7; i++) {
      var off = 8 + i*17 + Math.random()*6;
      x.beginPath(); x.moveTo(off, 0);
      for (var y = 0; y <= 512; y += 20) x.lineTo(off + Math.sin(y*0.03+i)*7, y);
      var grd = x.createLinearGradient(0,0,0,512);
      grd.addColorStop(0,'#3a2a08'); grd.addColorStop(0.5,'#f0bd45'); grd.addColorStop(1,'#caa030');
      x.strokeStyle = grd; x.lineWidth = 1.8; x.shadowColor = '#ffcf5a'; x.shadowBlur = 6; x.stroke();
      x.shadowBlur = 9;
      for (var y2 = 36; y2 < 512; y2 += 66) {
        var yy = y2 + Math.random()*22, xx = off + Math.sin(yy*0.03+i)*7;
        x.beginPath(); x.arc(xx,yy,2.4,0,7); x.fillStyle = '#ffda6e'; x.fill();
        x.beginPath(); x.arc(xx,yy,5.5,0,7); x.strokeStyle = 'rgba(255,200,90,.5)'; x.lineWidth = 1; x.stroke();
      }
    }
    var t = new THREE.CanvasTexture(c);
    t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.RepeatWrapping; t.repeat.set(3,2.4); t.needsUpdate = true;
    return t;
  }

  function makeRingTex() {
    var c = document.createElement('canvas'); c.width = c.height = 256;
    var x = c.getContext('2d'); x.translate(128,128);
    x.strokeStyle = '#ffd877'; x.shadowColor = '#ffc24a'; x.shadowBlur = 18;
    x.lineWidth = 6; x.beginPath(); x.arc(0,0,82,0,7); x.stroke();
    x.lineWidth = 3; x.beginPath(); x.arc(0,0,60,0,7); x.stroke();
    x.lineWidth = 2; x.beginPath(); x.arc(0,0,28,0,7); x.stroke();
    for (var i = 0; i < 12; i++) {
      var a = i/12*6.283;
      x.beginPath(); x.moveTo(Math.cos(a)*30,Math.sin(a)*30); x.lineTo(Math.cos(a)*58,Math.sin(a)*58); x.stroke();
    }
    x.fillStyle = '#fff3cc'; x.beginPath(); x.arc(0,0,12,0,7); x.fill();
    var t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
  }

  function makeMandalaTex() {
    var S = 1024, c = document.createElement('canvas'); c.width = c.height = S;
    var x = c.getContext('2d'); x.translate(S/2,S/2);
    x.strokeStyle = '#f0b43a'; x.shadowColor = '#ffcf5a'; x.shadowBlur = 7;
    var R = S*0.47;
    [0.18,0.34,0.56,0.78,0.9,1.0].forEach(function(r,i) {
      x.lineWidth = (i>=4) ? 3 : 1.3; x.beginPath(); x.arc(0,0,R*r,0,7); x.stroke();
    });
    x.lineWidth = 1;
    for (var i = 0; i < 60; i++) {
      var a = i/60*6.283;
      x.beginPath(); x.moveTo(Math.cos(a)*R*0.56,Math.sin(a)*R*0.56); x.lineTo(Math.cos(a)*R*0.9,Math.sin(a)*R*0.9); x.stroke();
    }
    for (var i = 0; i < 24; i++) {
      var a = i/24*6.283;
      x.beginPath(); x.arc(Math.cos(a)*R*0.78,Math.sin(a)*R*0.78,R*0.028,0,7); x.stroke();
    }
    for (var i = 0; i < 6; i++) {
      var a = i/6*6.283;
      x.beginPath(); x.arc(Math.cos(a)*R*0.16,Math.sin(a)*R*0.16,R*0.16,0,7); x.stroke();
    }
    var t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
  }

  var HSV = 'vec3 hsv2rgb(vec3 c){ vec4 K=vec4(1.,2./3.,1./3.,3.); vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y); }';

  var canvas = document.getElementById('main-canvas');
  var W = canvas.clientWidth || window.innerWidth;
  var H = canvas.clientHeight || window.innerHeight;

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H, false);
  renderer.setClearColor(new THREE.Color(0.012, 0.012, 0.02));

  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(new THREE.Color(0.02, 0.02, 0.035), 0.012);

  var camera = new THREE.PerspectiveCamera(46, W/H, 0.1, 400);
  camera.position.set(2, 5.6, 16.5);

  var orb = { theta:0.18, phi:1.32, radius:16.5, tTheta:0.18, tPhi:1.32, tRadius:16.5, target: new THREE.Vector3(0,4.4,0) };
  var _autoRot = true, _dragging = false;
  canvas.style.touchAction = 'none';
  canvas.addEventListener('pointerdown', function(e) {
    _dragging = true;
    try { canvas.setPointerCapture(e.pointerId); } catch(err) {}
  });
  canvas.addEventListener('pointerup',     function() { _dragging = false; });
  canvas.addEventListener('pointercancel', function() { _dragging = false; });
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    orb.tRadius = Math.min(40, Math.max(6.5, orb.tRadius * (1 + Math.sign(e.deltaY)*0.09)));
  }, { passive: false });

  // sky dome
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(200,24,12),
    new THREE.ShaderMaterial({
      side: THREE.BackSide, depthWrite: false, fog: false,
      vertexShader: 'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
      fragmentShader: 'varying vec3 vP; void main(){ float h=normalize(vP).y; vec3 a=vec3(0.02,0.02,0.045); vec3 b=vec3(0.05,0.04,0.09); vec3 c=mix(b,a,smoothstep(-0.2,0.6,h)); gl_FragColor=vec4(c,1.0); }'
    })
  ));
  scene.add(new THREE.HemisphereLight(0x4a4a66, 0x0a0a10, 0.8));
  var sun = new THREE.DirectionalLight(0xbfc4ff, 0.7); sun.position.set(-8,10,6); scene.add(sun);

  // mandala ground
  var mandala = new THREE.Mesh(
    new THREE.PlaneGeometry(22,22),
    new THREE.MeshBasicMaterial({ map:makeMandalaTex(), transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.85 })
  );
  mandala.rotation.x = -Math.PI/2; mandala.position.y = 0.02; scene.add(mandala);
  var groundGlow = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshBasicMaterial({ map:radialTex('rgba(255,205,120,0.5)','rgba(255,180,80,0)'), transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.5 })
  );
  groundGlow.rotation.x = -Math.PI/2; groundGlow.position.y = 0.04; scene.add(groundGlow);

  // trunk
  var bark = makeBarkTex();
  var trunkMat = new THREE.MeshBasicMaterial({ map: bark });
  var trunkGrp = new THREE.Group();
  var trunkH = 5.2;
  var tp2 = [];
  for (var i = 0; i <= 12; i++) {
    var tt = i/12, yy = tt*trunkH;
    var sw = Math.sin(tt*Math.PI*1.7);
    tp2.push(new THREE.Vector3(sw*0.5*(1-tt*0.25)+Math.sin(tt*6)*0.05, yy, Math.cos(tt*Math.PI*1.25)*0.32*(1-tt*0.1)));
  }
  var trunkCurve = new THREE.CatmullRomCurve3(tp2);
  trunkGrp.add(new THREE.Mesh(new THREE.TubeGeometry(trunkCurve,90,0.34,16,false), trunkMat));
  var baseCone = new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.92,1.5,16), trunkMat);
  baseCone.position.y = 0.55; trunkGrp.add(baseCone);
  for (var i = 0; i < 9; i++) {
    var ra = (i/9)*Math.PI*2 + Math.random()*0.4;
    var rr = 1.7 + Math.random()*1.4;
    var rpts = [
      new THREE.Vector3(0, 0.7, 0),
      new THREE.Vector3(Math.cos(ra)*0.5, 0.28, Math.sin(ra)*0.5),
      new THREE.Vector3(Math.cos(ra)*rr*0.7, 0.08, Math.sin(ra)*rr*0.7),
      new THREE.Vector3(Math.cos(ra)*rr, 0.03, Math.sin(ra)*rr),
    ];
    trunkGrp.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(rpts),28,0.13,8,false), trunkMat));
  }

  // ZONE boughs (12, one per zone)
  var attach = [];
  for (var zi = 0; zi < ZONES.length; zi++) {
    var zone = ZONES[zi];
    var ba = zone.angle + (Math.random()-0.5)*0.15;
    var blen = 1.7 + Math.random()*1.3;
    var btilt = 0.42 + Math.random()*0.26;
    var bdx = Math.cos(ba), bdz = Math.sin(ba);
    var bstartY = trunkH - 0.6 - Math.random()*0.8;
    var bp = [
      new THREE.Vector3(bdx*0.15, bstartY, bdz*0.15),
      new THREE.Vector3(bdx*blen*0.55, bstartY+blen*0.5*Math.cos(btilt), bdz*blen*0.55),
      new THREE.Vector3(bdx*blen*1.05, bstartY+blen*0.92*Math.cos(btilt), bdz*blen*1.05),
    ];
    var zc = new THREE.Color(zone.hex);
    var bmat = new THREE.MeshBasicMaterial({ map: bark, color: new THREE.Color().lerpColors(new THREE.Color(0x887766), zc, 0.45) });
    trunkGrp.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(bp),18,0.12,8,false), bmat));
    var tipv = bp[2];
    var hsl = {}; zc.getHSL(hsl);
    attach.push({ x:tipv.x, y:tipv.y, z:tipv.z, a:ba, hue:hsl.h, zoneIdx:zi,
      spread:1.0+Math.random()*1.0, droop:3.6+Math.random()*2.6, lenJ:0.85+Math.random()*0.5 });
  }
  scene.add(trunkGrp);

  // vines / leaves / sparkles geometry arrays
  var offsets=[], scales=[], rots=[], tilts_arr=[], heights=[], phases=[], tints=[], hues_arr=[];
  var lp=[], lh=[], lph=[], lhue=[];
  var sp_pos=[], sH=[], sPh=[], sHue=[], sTw=[], sSz=[];

  // spring state per strand (for chime physics)
  var springs = [];
  var STRANDS = 320;
  var SPRING_K = 0.018, SPRING_DAMP = 0.88, SPRING_MAX = 55;

  for (var s = 0; s < STRANDS; s++) {
    var base = attach[s % attach.length];
    var shue = (base.hue + (Math.random()-0.5)*0.04 + 1.0) % 1.0;
    var sang = base.a + (Math.random()-0.5)*0.95;
    var rIn = 0.25 + Math.random()*1.3;
    var ssx = base.x*0.4 + Math.cos(sang)*rIn;
    var ssz = base.z*0.4 + Math.sin(sang)*rIn;
    var ssy = base.y - 0.1 + (Math.random()-0.5)*0.7;
    var sodx = Math.cos(sang), sodz = Math.sin(sang);
    var sspread = base.spread*(0.8+Math.random()*0.8);
    var sdroop = base.droop*base.lenJ*(0.7+Math.random()*0.6);
    var segs = 16 + Math.floor(Math.random()*9);
    var sphase = Math.random()*Math.PI*2;
    var wobF = 4+Math.random()*4, wobA = 0.07+Math.random()*0.12;
    springs.push({ sx:ssx,sy:ssy,sz:ssz, odx:sodx,odz:sodz, dx:0,dz:0,vx:0,vz:0 });
    var prev = null;
    for (var si = 0; si <= segs; si++) {
      var st = si/segs;
      var out  = Math.sin(st*Math.PI*0.5)*sspread;
      var down = Math.pow(st,1.45)*sdroop;
      var wob  = Math.sin(st*wobF+sphase)*wobA;
      var px = ssx + sodx*out + sodz*wob;
      var pz = ssz + sodz*out - sodx*wob;
      var py = Math.max(0.12, ssy - down);
      if (prev) { lp.push(prev.x,prev.y,prev.z,px,py,pz); lh.push(prev.t,st); lph.push(sphase,sphase); lhue.push(shue,shue); }
      prev = { x:px, y:py, z:pz, t:st };
      if (si===0) continue;
      var leafN = si < segs-2 ? 3 : 4;
      for (var k = 0; k < leafN; k++) {
        offsets.push(px+(Math.random()-0.5)*0.15, py+(Math.random()-0.5)*0.2, pz+(Math.random()-0.5)*0.15);
        scales.push(0.32+Math.random()*0.4);
        rots.push(Math.random()*Math.PI*2);
        tilts_arr.push((Math.random()-0.5)*0.5);
        heights.push(st); phases.push(sphase+Math.random()*0.6); tints.push(Math.random()); hues_arr.push(shue);
      }
      var spN = 1 + (Math.random() < st ? 1 : 0);
      for (var k = 0; k < spN; k++) {
        sp_pos.push(px+(Math.random()-0.5)*0.22, py+(Math.random()-0.5)*0.24, pz+(Math.random()-0.5)*0.22);
        sH.push(st); sPh.push(sphase); sHue.push(shue); sTw.push(Math.random()); sSz.push(0.6+Math.random()*1.6+st*0.9);
      }
    }
  }

  // uniforms
  var _spectral = true, _wind = 0.6, _mouseWind = 0;
  var U  = { uTime:{value:0}, uWind:{value:_wind}, uWindDir:{value:new THREE.Vector2(0.85,0.32)}, uBright:{value:1.0}, uSpectral:{value:1} };
  var LU = { uTime:{value:0}, uWind:{value:_wind}, uWindDir:{value:new THREE.Vector2(0.85,0.32)}, uSpectral:{value:1} };
  var SU = { uTime:{value:0}, uWind:{value:_wind}, uWindDir:{value:new THREE.Vector2(0.85,0.32)}, uScale:{value:H}, uSpectral:{value:1} };
  var wms = [U, LU, SU];

  // leaf instances
  var baseLeaf = new THREE.PlaneGeometry(1,1);
  var geo = new THREE.InstancedBufferGeometry();
  geo.index = baseLeaf.index;
  geo.setAttribute('position', baseLeaf.attributes.position);
  geo.setAttribute('uv',       baseLeaf.attributes.uv);
  geo.setAttribute('aOffset',  new THREE.InstancedBufferAttribute(new Float32Array(offsets),    3));
  geo.setAttribute('aScale',   new THREE.InstancedBufferAttribute(new Float32Array(scales),     1));
  geo.setAttribute('aRot',     new THREE.InstancedBufferAttribute(new Float32Array(rots),       1));
  geo.setAttribute('aTilt',    new THREE.InstancedBufferAttribute(new Float32Array(tilts_arr),  1));
  geo.setAttribute('aHeight',  new THREE.InstancedBufferAttribute(new Float32Array(heights),    1));
  geo.setAttribute('aPhase',   new THREE.InstancedBufferAttribute(new Float32Array(phases),     1));
  geo.setAttribute('aTint',    new THREE.InstancedBufferAttribute(new Float32Array(tints),      1));
  geo.setAttribute('aHue',     new THREE.InstancedBufferAttribute(new Float32Array(hues_arr),   1));
  geo.instanceCount = scales.length;
  geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,4,0), 44);

  var leafMat = new THREE.RawShaderMaterial({
    side: THREE.DoubleSide, transparent: false, uniforms: U, fog: false,
    vertexShader: [
      'precision highp float;',
      'attribute vec3 position; attribute vec2 uv;',
      'attribute vec3 aOffset; attribute float aScale; attribute float aRot; attribute float aTilt;',
      'attribute float aHeight; attribute float aPhase; attribute float aTint; attribute float aHue;',
      'uniform mat4 modelViewMatrix; uniform mat4 projectionMatrix;',
      'uniform float uTime; uniform float uWind; uniform vec2 uWindDir;',
      'varying vec2 vUv; varying float vTint; varying float vShade; varying float vH; varying float vShim; varying float vHue;',
      'mat3 rotY(float a){ float c=cos(a),s=sin(a); return mat3(c,0.,s,0.,1.,0.,-s,0.,c); }',
      'mat3 rotX(float a){ float c=cos(a),s=sin(a); return mat3(1.,0.,0.,0.,c,-s,0.,s,c); }',
      'void main(){',
      '  vUv=uv; vTint=aTint; vH=aHeight; vHue=aHue;',
      '  vec3 p=vec3(position.x*0.22,position.y*1.5,0.0)*aScale;',
      '  mat3 R=rotY(aRot)*rotX(aTilt); p=R*p;',
      '  vec3 n=R*vec3(0.,0.,1.);',
      '  vec3 world=aOffset+p;',
      '  float t=uTime;',
      '  float sway=sin(t*1.3+aPhase+aOffset.x*0.15+aOffset.z*0.12);',
      '  float sway2=sin(t*2.7+aPhase*1.7);',
      '  float amp=uWind*(aHeight*aHeight*1.3+0.04);',
      '  world.x+=(uWindDir.x*sway+0.3*sway2)*amp;',
      '  world.z+=(uWindDir.y*sway+0.3*sway2)*amp;',
      '  world.y+=0.12*amp*sin(t*1.9+aPhase);',
      '  vShim=0.5+0.5*sin(t*4.2+aPhase*3.1+aOffset.y*0.6);',
      '  vec3 sunDir=normalize(vec3(-0.5,0.6,0.45));',
      '  vShade=0.55+0.45*clamp(dot(normalize(n),sunDir)*0.5+0.5,0.,1.);',
      '  gl_Position=projectionMatrix*modelViewMatrix*vec4(world,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision highp float;',
      'varying vec2 vUv; varying float vTint; varying float vShade; varying float vH; varying float vShim; varying float vHue;',
      'uniform float uBright; uniform float uSpectral;',
      HSV,
      'void main(){',
      '  vec2 c=vUv-0.5; float d=length(vec2(c.x*2.0,c.y*0.95)); if(d>0.5) discard;',
      '  vec3 deep=vec3(0.55,0.36,0.07); vec3 gold=vec3(0.97,0.78,0.30); vec3 brightG=vec3(1.0,0.94,0.62);',
      '  vec3 golden=mix(deep,gold,smoothstep(0.,1.,vH)); golden=mix(golden,brightG,vTint*0.45);',
      '  float val=mix(0.45,1.0,vH);',
      '  vec3 spec=hsv2rgb(vec3(vHue,0.88,val));',
      '  spec=mix(spec,vec3(1.0),vTint*0.10+smoothstep(0.82,1.0,vH)*0.18);',
      '  vec3 col=mix(golden,spec,uSpectral);',
      '  col*=(0.7+0.4*vShade);',
      '  col+=mix(brightG,vec3(1.0),uSpectral)*vShim*0.22*(0.4+vTint*0.6);',
      '  col*=uBright;',
      '  gl_FragColor=vec4(col,1.0);',
      '}'
    ].join('\n')
  });
  var leaves = new THREE.Mesh(geo, leafMat); leaves.frustumCulled = false; scene.add(leaves);

  // vine lines
  var lgeo = new THREE.BufferGeometry();
  lgeo.setAttribute('position', new THREE.Float32BufferAttribute(lp,  3));
  lgeo.setAttribute('aHeight',  new THREE.Float32BufferAttribute(lh,  1));
  lgeo.setAttribute('aPhase',   new THREE.Float32BufferAttribute(lph, 1));
  lgeo.setAttribute('aHue',     new THREE.Float32BufferAttribute(lhue,1));
  var lineMat = new THREE.RawShaderMaterial({
    transparent:true, depthWrite:false, fog:false, uniforms:LU,
    vertexShader: [
      'precision highp float;',
      'attribute vec3 position; attribute float aHeight; attribute float aPhase; attribute float aHue;',
      'uniform mat4 modelViewMatrix; uniform mat4 projectionMatrix; uniform float uTime; uniform float uWind; uniform vec2 uWindDir;',
      'varying float vH; varying float vHue;',
      'void main(){',
      '  vH=aHeight; vHue=aHue; vec3 world=position; float t=uTime;',
      '  float sway=sin(t*1.3+aPhase+position.x*0.15+position.z*0.12);',
      '  float sway2=sin(t*2.7+aPhase*1.7);',
      '  float amp=uWind*(aHeight*aHeight*1.3+0.04);',
      '  world.x+=(uWindDir.x*sway+0.3*sway2)*amp;',
      '  world.z+=(uWindDir.y*sway+0.3*sway2)*amp;',
      '  world.y+=0.12*amp*sin(t*1.9+aPhase);',
      '  gl_Position=projectionMatrix*modelViewMatrix*vec4(world,1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision highp float; varying float vH; varying float vHue; uniform float uSpectral;',
      HSV,
      'void main(){',
      '  vec3 woody=mix(vec3(0.34,0.24,0.10),vec3(0.78,0.58,0.22),vH);',
      '  vec3 spec=hsv2rgb(vec3(vHue,0.8,mix(0.4,0.95,vH)));',
      '  vec3 col=mix(woody,spec,uSpectral);',
      '  gl_FragColor=vec4(col,0.22+vH*0.14);',
      '}'
    ].join('\n')
  });
  var vineLines = new THREE.LineSegments(lgeo, lineMat); vineLines.frustumCulled = false; scene.add(vineLines);

  // sparkles
  var sgeo = new THREE.BufferGeometry();
  sgeo.setAttribute('position', new THREE.Float32BufferAttribute(sp_pos,3));
  sgeo.setAttribute('aHeight',  new THREE.Float32BufferAttribute(sH,    1));
  sgeo.setAttribute('aPhase',   new THREE.Float32BufferAttribute(sPh,   1));
  sgeo.setAttribute('aHue',     new THREE.Float32BufferAttribute(sHue,  1));
  sgeo.setAttribute('aTw',      new THREE.Float32BufferAttribute(sTw,   1));
  sgeo.setAttribute('aSz',      new THREE.Float32BufferAttribute(sSz,   1));
  sgeo.boundingSphere = new THREE.Sphere(new THREE.Vector3(0,4,0), 44);
  var sparkMat = new THREE.RawShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, fog:false, uniforms:SU,
    vertexShader: [
      'precision highp float;',
      'attribute vec3 position; attribute float aHeight; attribute float aPhase; attribute float aHue; attribute float aTw; attribute float aSz;',
      'uniform mat4 modelViewMatrix; uniform mat4 projectionMatrix; uniform float uTime; uniform float uWind; uniform vec2 uWindDir; uniform float uScale;',
      'varying float vTw; varying float vHue;',
      'void main(){',
      '  vHue=aHue; vec3 world=position; float t=uTime;',
      '  float sway=sin(t*1.3+aPhase+position.x*0.15+position.z*0.12);',
      '  float sway2=sin(t*2.7+aPhase*1.7);',
      '  float amp=uWind*(aHeight*aHeight*1.3+0.04);',
      '  world.x+=(uWindDir.x*sway+0.3*sway2)*amp;',
      '  world.z+=(uWindDir.y*sway+0.3*sway2)*amp;',
      '  world.y+=0.12*amp*sin(t*1.9+aPhase);',
      '  float ph=aTw*6.283;',
      '  float a=0.5+0.5*sin(t*1.05+ph); float b=0.5+0.5*sin(t*2.3+ph*1.6);',
      '  float tw=pow(a*b,2.5); vTw=tw;',
      '  vec4 mv=modelViewMatrix*vec4(world,1.0);',
      '  gl_PointSize=aSz*(0.35+1.7*tw)*uScale/max(0.5,-mv.z);',
      '  gl_Position=projectionMatrix*mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision highp float; varying float vTw; varying float vHue; uniform float uSpectral;',
      HSV,
      'void main(){',
      '  vec2 c=gl_PointCoord-0.5; float d=length(c); if(d>0.5) discard;',
      '  float halo=smoothstep(0.5,0.0,d); float core=pow(clamp(1.0-d*2.0,0.0,1.0),1.5);',
      '  vec3 tint=hsv2rgb(vec3(vHue,0.5,1.0)); vec3 warm=vec3(1.0,0.95,0.82);',
      '  vec3 col=mix(warm,mix(warm,tint,0.4),uSpectral);',
      '  vec3 outc=(col*core*1.15+vec3(1.0)*core*0.35)*vTw;',
      '  gl_FragColor=vec4(outc,(halo*0.25+core)*vTw);',
      '}'
    ].join('\n')
  });
  var sparkles = new THREE.Points(sgeo, sparkMat); sparkles.frustumCulled = false; scene.add(sparkles);

  // zone ring nodes (colored per zone)
  var rTex = makeRingTex();
  var ringGrp = new THREE.Group();
  for (var ai = 0; ai < attach.length; ai++) {
    var at = attach[ai];
    var zc2 = new THREE.Color(ZONES[at.zoneIdx].hex);
    var spr = new THREE.Sprite(new THREE.SpriteMaterial({
      map: rTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.95, color: zc2
    }));
    spr.position.set(at.x*1.16, at.y+0.35, at.z*1.16);
    spr.scale.set(1.5,1.5,1.5);
    ringGrp.add(spr);
  }
  scene.add(ringGrp);

  // haze
  var haze = new THREE.Mesh(new THREE.PlaneGeometry(24,24),
    new THREE.MeshBasicMaterial({ map:radialTex('rgba(255,255,255,0.5)','rgba(200,200,255,0)'), transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.18, color:0xddddff }));
  haze.position.set(0,5.6,-2); scene.add(haze);

  // fog sprites
  var fogTex = radialTex('rgba(150,170,255,0.6)','rgba(120,140,255,0)');
  var fogGrp = new THREE.Group(); var fogObjs = [];
  for (var fi = 0; fi < 8; fi++) {
    var fc = new THREE.Color().setHSL(Math.random(),0.5,0.6);
    var fm = new THREE.Sprite(new THREE.SpriteMaterial({ map:fogTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.05+Math.random()*0.05, color:fc }));
    var fr = 4+Math.random()*6, fa = Math.random()*6.283;
    fm.position.set(Math.cos(fa)*fr, 1.4+Math.random()*5.2, Math.sin(fa)*fr);
    var fsc = 7+Math.random()*6; fm.scale.set(fsc,fsc,fsc); fogGrp.add(fm);
    fogObjs.push({ m:fm, vx:(Math.random()-0.5)*0.01, vz:(Math.random()-0.5)*0.01, base:fm.material.opacity, ph:Math.random()*6.283 });
  }
  scene.add(fogGrp);

  // motes
  var moteN = 360, mpos = new Float32Array(moteN*3); var moteVel = [];
  for (var mi = 0; mi < moteN; mi++) {
    mpos[mi*3]=(Math.random()-0.5)*17; mpos[mi*3+1]=Math.random()*9+0.5; mpos[mi*3+2]=(Math.random()-0.5)*17;
    moteVel.push({ x:(Math.random()-0.5)*0.004, y:-0.004-Math.random()*0.006, sw:Math.random()*6.283 });
  }
  var mgeo = new THREE.BufferGeometry(); mgeo.setAttribute('position', new THREE.BufferAttribute(mpos,3));
  var motes = new THREE.Points(mgeo, new THREE.PointsMaterial({
    size:0.12, map:radialTex('rgba(255,245,220,1)','rgba(255,210,140,0)'), transparent:true, depthWrite:false,
    blending:THREE.AdditiveBlending, color:0xffe6b0, opacity:0.8, sizeAttenuation:true
  })); motes.frustumCulled = false; scene.add(motes);

  // interaction
  var ray = new THREE.Raycaster();
  var _ndc = null, _hoverIdx = -1, _mouseClient = null;
  var _lastMX = null, _lastMY = null;
  var CHIME_RADIUS = 5.5, CHIME_IMPULSE = 0.12;

  canvas.addEventListener('pointermove', function(e) {
    var r = canvas.getBoundingClientRect();
    if (!_ndc) _ndc = new THREE.Vector2();
    _ndc.x = ((e.clientX-r.left)/r.width)*2-1;
    _ndc.y = -((e.clientY-r.top)/r.height)*2+1;
    _mouseClient = { x:e.clientX, y:e.clientY };
    if (_lastMX != null) {
      var dx = e.clientX-_lastMX, dy = e.clientY-_lastMY;
      var spd = Math.hypot(dx,dy);
      _mouseWind = Math.min(1.6, _mouseWind + spd*(_dragging ? 0.003 : 0.006));
      if (_dragging) {
        orb.tTheta -= dx*0.006;
        orb.tPhi = Math.min(1.92, Math.max(0.04, orb.tPhi - dy*0.006));
      } else if (spd > 1.5) {
        // chime: find world hit on plane through tree center facing camera
        ray.setFromCamera(_ndc, camera);
        var camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
        var plane = new THREE.Plane(); plane.setFromNormalAndCoplanarPoint(camDir.negate(), new THREE.Vector3(0,4,0));
        var worldHit = new THREE.Vector3();
        if (ray.ray.intersectPlane(plane, worldHit)) {
          var impX = (dx/window.innerWidth)*3, impZ = (dy/window.innerHeight)*3;
          for (var si2 = 0; si2 < springs.length; si2++) {
            var sp2 = springs[si2];
            var dd = Math.hypot(sp2.sx - worldHit.x, sp2.sy - worldHit.y, sp2.sz - worldHit.z);
            if (dd < CHIME_RADIUS) {
              var falloff = Math.pow(1.0 - dd/CHIME_RADIUS, 1.0 + CHIME_IMPULSE);
              sp2.vx = Math.max(-SPRING_MAX, Math.min(SPRING_MAX, sp2.vx + impX*falloff*CHIME_IMPULSE));
              sp2.vz = Math.max(-SPRING_MAX, Math.min(SPRING_MAX, sp2.vz + impZ*falloff*CHIME_IMPULSE));
            }
          }
        }
      }
    }
    _lastMX = e.clientX; _lastMY = e.clientY;
  });
  canvas.addEventListener('pointerleave', function() {
    _ndc = null; _lastMX = null;
    document.getElementById('hov-tip').style.opacity = '0';
    _hoverIdx = -1; canvas.style.cursor = 'default';
  });
  canvas.addEventListener('click', function() {
    if (_hoverIdx >= 0) openZonePanel(_hoverIdx);
  });

  function openZonePanel(idx) {
    var zone = ZONES[attach[idx].zoneIdx];
    document.getElementById('zp-id').textContent = 'Zone ' + zone.id;
    document.getElementById('zp-name').textContent = zone.name;
    document.getElementById('zp-name').style.color = zone.hex;
    document.getElementById('zp-wave').textContent = zone.wavelength;
    document.getElementById('zp-principle').textContent = zone.principle;
    document.getElementById('zp-oil').textContent = zone.oil;
    document.getElementById('zone-panel-header').style.borderBottomColor = zone.hex + '44';
    document.getElementById('zone-panel-close').style.color = zone.hex;
    document.getElementById('zone-panel').classList.add('open');
  }
  document.getElementById('zone-panel-close').addEventListener('click', function() {
    document.getElementById('zone-panel').classList.remove('open');
  });

  var tip = document.getElementById('hov-tip');

  // controls
  var _sparkleOn = true;
  var windSlider = document.getElementById('wind-slider');
  var windLabel  = document.getElementById('wind-label');
  windSlider.addEventListener('input', function(e) {
    _wind = parseFloat(e.target.value);
    windLabel.textContent = Math.round((_wind/1.5)*100) + '%';
  });

  function styleBtn(id, on, onColor) {
    var el = document.getElementById(id);
    if (on) { el.style.color = '#0d0b06'; el.style.background = onColor; el.style.borderColor = onColor; }
    else     { el.style.color = '#f5ecd8'; el.style.background = 'rgba(255,210,140,.06)'; el.style.borderColor = 'rgba(255,210,140,.2)'; }
  }
  function refreshBtns() {
    styleBtn('btn-spin',     _autoRot,   'rgba(255,206,120,.85)');
    styleBtn('btn-sparkle',  _sparkleOn, 'rgba(255,206,120,.85)');
    styleBtn('btn-spectral', _spectral,  'rgba(210,150,255,.8)');
    document.getElementById('btn-spectral').textContent = _spectral ? 'Rainbow' : 'Golden';
  }
  refreshBtns();
  document.getElementById('btn-spin').addEventListener('click', function() { _autoRot = !_autoRot; refreshBtns(); });
  document.getElementById('btn-sparkle').addEventListener('click', function() { _sparkleOn = !_sparkleOn; sparkles.visible = _sparkleOn; refreshBtns(); });
  document.getElementById('btn-spectral').addEventListener('click', function() {
    _spectral = !_spectral; wms.forEach(function(m){ m.uSpectral.value = _spectral ? 1 : 0; }); refreshBtns();
  });

  window.addEventListener('resize', function() {
    var w = canvas.clientWidth||window.innerWidth, h = canvas.clientHeight||window.innerHeight;
    renderer.setSize(w,h,false); camera.aspect = w/h; camera.updateProjectionMatrix(); SU.uScale.value = h;
  });

  var clock = new THREE.Clock();
  function tick() {
    requestAnimationFrame(tick);
    var t = clock.getElapsedTime();
    var n = 0.55 + 0.28*Math.sin(t*0.6) + 0.18*Math.sin(t*0.27+2.0) + 0.12*Math.sin(t*1.27+0.5) + 0.1*Math.sin(t*0.13+4.0);
    n = Math.max(0.06, n);
    _mouseWind *= 0.93;
    var windNow = _wind*n + _mouseWind;
    var wa = 0.45 + 0.4*Math.sin(t*0.07) + 0.15*Math.sin(t*0.21);
    var wdx = Math.cos(wa), wdz = Math.sin(wa);
    wms.forEach(function(m){ m.uTime.value = t; m.uWind.value = windNow; m.uWindDir.value.set(wdx,wdz); });

    // motes
    var arr = motes.geometry.attributes.position.array;
    for (var mi2 = 0; mi2 < moteN; mi2++) {
      var mv = moteVel[mi2];
      arr[mi2*3]   += mv.x + wdx*windNow*0.01 + Math.sin(t*0.6+mv.sw)*0.003;
      arr[mi2*3+1] += mv.y*(0.6+windNow*0.4);
      arr[mi2*3+2] += wdz*windNow*0.01 + Math.cos(t*0.5+mv.sw)*0.003;
      if (arr[mi2*3+1] < 0.1) { arr[mi2*3]=(Math.random()-0.5)*17; arr[mi2*3+1]=9+Math.random()*2; arr[mi2*3+2]=(Math.random()-0.5)*17; }
    }
    motes.geometry.attributes.position.needsUpdate = true;

    // spring chime tick
    for (var si3 = 0; si3 < springs.length; si3++) {
      var sp3 = springs[si3];
      sp3.vx += -SPRING_K * sp3.dx;
      sp3.vz += -SPRING_K * sp3.dz;
      sp3.vx *= SPRING_DAMP;
      sp3.vz *= SPRING_DAMP;
      sp3.dx += sp3.vx;
      sp3.dz += sp3.vz;
    }

    // fog
    for (var fi2 = 0; fi2 < fogObjs.length; fi2++) {
      var fo = fogObjs[fi2];
      fo.m.position.x += fo.vx*(0.5+windNow) + wdx*windNow*0.004;
      fo.m.position.z += fo.vz*(0.5+windNow) + wdz*windNow*0.004;
      var rf = Math.hypot(fo.m.position.x, fo.m.position.z);
      if (rf > 13) { fo.m.position.x *= -0.85; fo.m.position.z *= -0.85; }
      fo.m.material.opacity = fo.base*(0.6+0.4*Math.sin(t*0.4+fo.ph));
    }

    // hover
    var hov = -1;
    if (_ndc) {
      ray.setFromCamera(_ndc, camera);
      var hits = ray.intersectObjects(ringGrp.children, false);
      if (hits.length) hov = ringGrp.children.indexOf(hits[0].object);
    }
    if (hov !== _hoverIdx) {
      _hoverIdx = hov;
      canvas.style.cursor = hov >= 0 ? 'pointer' : 'default';
      if (hov >= 0) {
        var zinfo = ZONES[attach[hov].zoneIdx];
        tip.textContent = zinfo.name + ' · ' + zinfo.oil;
        tip.style.borderColor = zinfo.hex;
        tip.style.boxShadow = '0 6px 22px rgba(0,0,0,.5), 0 0 16px ' + zinfo.hex;
        tip.style.opacity = '1';
      } else { tip.style.opacity = '0'; }
    }
    if (hov >= 0 && _mouseClient) { tip.style.left = _mouseClient.x+'px'; tip.style.top = _mouseClient.y+'px'; }

    // ring pulse
    for (var ri = 0; ri < ringGrp.children.length; ri++) {
      var rm = ringGrp.children[ri];
      var hv = ri === hov ? 1.0 : 0.0;
      var rs = (1.5+hv*0.75)*(0.92+0.14*Math.sin(t*1.6+ri*0.7));
      rm.scale.set(rs,rs,rs);
      rm.material.opacity = Math.min(1.0, 0.8+0.2*Math.sin(t*2.0+ri)+hv*0.3);
    }

    // orbit
    if (_autoRot && !_dragging) orb.tTheta += 0.0016;
    orb.theta  += (orb.tTheta  - orb.theta)  * 0.1;
    orb.phi    += (orb.tPhi    - orb.phi)    * 0.1;
    orb.radius += (orb.tRadius - orb.radius) * 0.1;
    camera.position.set(
      orb.target.x + orb.radius*Math.sin(orb.phi)*Math.sin(orb.theta),
      orb.target.y + orb.radius*Math.cos(orb.phi),
      orb.target.z + orb.radius*Math.sin(orb.phi)*Math.cos(orb.theta)
    );
    camera.lookAt(orb.target);
    haze.lookAt(camera.position.x, haze.position.y, camera.position.z);
    renderer.render(scene, camera);
  }
  tick();
})();
</script>
</body>
</html>
