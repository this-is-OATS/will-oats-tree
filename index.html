(function() {

      var hv = ri === hov ? 1.0 : 0.0;
      var rs = (1.5+hv*0.75)*(0.92+0.14*Math.sin(t*1.6+ri*0.7));
      rm.scale.set(rs,rs,rs);
      rm.material.opacity = Math.min(1.0, 0.8+0.2*Math.sin(t*2.0+ri)+hv*0.3);
    }

    // orbit
    if (_autoRot && !_dragging) {
      orb.tTheta += _spinSpeed;
    } else if (!_dragging) {
      // keep tTheta in sync so re-enabling spin doesn't snap/jump
      orb.tTheta = orb.theta;
    }
    orb.theta  += (orb.tTheta  - orb.theta)  * 0.1;
    orb.phi    += (orb.tPhi    - orb.phi)    * 0.1;
    orb.radius += (orb.tRadius - orb.radius) * 0.1;
    orb.target.y += (_tTargetY - orb.target.y) * 0.1;
    camera.position.set(
      orb.target.x + orb.radius*Math.sin(orb.phi)*Math.sin(orb.theta),
      orb.target.y + orb.radius*Math.cos(orb.phi),
      orb.target.z + orb.radius*Math.sin(orb.phi)*Math.cos(orb.theta)
    );
    camera.lookAt(orb.target);
    haze.lookAt(camera.position.x, haze.position.y, camera.position.z);
    renderer.render(scene, camera);
    if (_tlLabels.length) projectTlLabels();
  }
  tick();
})();
</script>

</html>
